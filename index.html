<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙与地下城 2048：流金岁月版</title>
    <style>
        :root {
            --bg-color: #0c0b0e;
            --panel-bg: #1a171c;
            --text-main: #e6e1d8;
            --text-muted: #8c8279;
            --gold: #dfb15b;
            --gold-bright: #ffd700;
            --grid-bg: #1c181a;
            --cell-bg: #110e0f;
            --btn-bg: linear-gradient(180deg, #382c33 0%, #1e171b 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #161218 0%, #060507 100%);
            color: var(--text-main);
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding: 20px 10px;
        }

        header {
            width: 100%; max-width: 500px; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 15px;
        }

        .title-area h1 { color: var(--gold); font-size: 26px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px; }
        .title-area p { font-size: 13px; color: var(--text-muted); }

        .stats-area { display: flex; gap: 8px; }
        .stat-box {
            background: linear-gradient(180deg, #2a2228 0%, #171316 100%);
            border: 1px solid #483a42; padding: 5px 12px; border-radius: 6px;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.6); min-width: 60px;
        }
        .stat-box span { display: block; font-size: 10px; color: var(--gold); text-transform: uppercase; }
        .stat-box strong { font-size: 16px; color: #fff; }
        .stat-box.gold-box strong { color: var(--gold-bright); text-shadow: 0 0 5px rgba(255,215,0,0.5); }

        /* Ability Panel */
        .ability-panel {
            width: 100%; max-width: 500px; background: #1f1b1e;
            border: 1px solid var(--gold); border-radius: 6px;
            padding: 10px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }
        .ability-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .ability-icon { width: 36px; height: 36px; background: #000; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; }
        .ability-icon svg { width: 80%; height: 80%; image-rendering: pixelated; }
        .ability-text { flex: 1; display: flex; flex-direction: column; }
        .ability-name { font-size: 14px; font-weight: bold; color: var(--gold-bright); }
        .ability-desc { font-size: 10px; color: var(--text-muted); line-height: 1.2; margin-top: 2px; }
        
        .btn-use-ability {
            background: var(--btn-bg); color: #aaa; border: 1px solid #444;
            padding: 8px 12px; border-radius: 4px; font-weight: bold; font-family: inherit;
            cursor: not-allowed; transition: all 0.3s; font-size: 12px; white-space: nowrap;
        }
        .btn-use-ability.ready {
            background: linear-gradient(180deg, #558b2f 0%, #33691e 100%);
            color: #fff; border-color: #8bc34a; cursor: pointer;
            box-shadow: 0 0 10px rgba(139, 195, 74, 0.5); animation: pulse-btn 1.5s infinite;
        }
        .btn-use-ability.ready:active { transform: translateY(2px); }

        /* Gold Abilities */
        .gold-abilities {
            width: 100%; max-width: 500px; display: flex; gap: 8px; margin-bottom: 15px;
        }
        .gold-btn {
            flex: 1; background: linear-gradient(180deg, #3c2a1a 0%, #201308 100%);
            color: var(--gold-bright); border: 1px solid #8a6a3b; padding: 8px 0;
            border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold;
            font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gold-btn:hover:not(:disabled) { background: #4a3622; border-color: var(--gold-bright); }
        .gold-btn:active:not(:disabled) { transform: translateY(2px); }
        .gold-btn:disabled { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        .gold-btn span { font-size: 10px; color: #fff; margin-top: 2px; }

        @keyframes pulse-btn { 0%, 100% { box-shadow: 0 0 5px rgba(139,195,74,0.5); } 50% { box-shadow: 0 0 15px rgba(139,195,74,1); } }

        /* Game Board */
        .game-wrapper { position: relative; width: 100%; max-width: 500px; }
        .game-container {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            background: var(--grid-bg); border-radius: 8px;
            border: 3px solid #362a30; padding: 2%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 10px 30px rgba(0,0,0,0.8);
            transition: box-shadow 0.3s;
        }
        .grid-background {
            display: grid; grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr); gap: 2%; width: 100%; height: 100%;
        }
        .grid-cell { background: var(--cell-bg); border-radius: 4px; box-shadow: inset 0 0 8px rgba(0,0,0,0.8); }

        .tile-container { position: absolute; top: 2%; left: 2%; right: 2%; bottom: 2%; pointer-events: none; }
        .tile { position: absolute; width: 18.4%; height: 18.4%; transition: transform 0.15s ease-in-out; z-index: 10; }
        .tile-inner {
            width: 100%; height: 100%; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            position: relative; animation: appear 0.2s forwards;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); overflow: hidden;
            border: 2px solid #333; background-color: var(--panel-bg);
        }
        .tile.merged .tile-inner { animation: pop 0.2s forwards; }

        /* VFX Animations */
        @keyframes shatter {
            0% { transform: scale(1); opacity: 1; filter: brightness(1) sepia(0); }
            50% { transform: scale(1.3); opacity: 0.8; filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(500%); }
            100% { transform: scale(0); opacity: 0; filter: brightness(0); }
        }
        .tile.destroyed .tile-inner { animation: shatter 0.3s forwards !important; border-color: #ff0000 !important; }

        @keyframes crit-pop {
            0% { transform: scale(0.8); box-shadow: 0 0 0px var(--gold-bright); }
            50% { transform: scale(1.3); box-shadow: 0 0 40px var(--gold-bright); z-index: 100;}
            100% { transform: scale(1); box-shadow: 0 0 10px var(--gold-bright); }
        }
        .tile.crit .tile-inner { animation: crit-pop 0.6s forwards !important; border-color: var(--gold-bright) !important; }

        /* 洗牌特效 */
        .tile.shuffle-anim .tile-inner { animation: shuffle-vfx 0.5s ease-in-out forwards !important; }
        @keyframes shuffle-vfx {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(0.5) rotate(180deg); opacity: 0.5; filter: blur(2px); }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        /* 交换特效 */
        .tile.swap-anim .tile-inner { animation: swap-vfx 0.5s ease-in-out forwards !important; border-color: #00bcd4 !important; }
        @keyframes swap-vfx {
            0% { box-shadow: 0 0 0 #00bcd4; }
            50% { box-shadow: 0 0 30px #00bcd4, 0 0 10px #fff; transform: scale(1.15) rotate(5deg); }
            100% { box-shadow: 0 0 0 #00bcd4; }
        }

        /* 吸血鬼升级特效 */
        .tile.vampire-up .tile-inner { animation: vamp-up-vfx 0.6s forwards !important; border-color: #b71c1c !important; }
        @keyframes vamp-up-vfx {
            0% { box-shadow: 0 0 0 #b71c1c; }
            50% { box-shadow: 0 0 40px #b71c1c, 0 0 20px #ff0000; transform: scale(1.25); z-index: 100; }
            100% { box-shadow: 0 0 10px #b71c1c; }
        }

        /* 火元素被动特效 */
        .tile.fire-upgrade .tile-inner { animation: fire-up 0.6s forwards !important; border-color: #ff9800 !important; }
        @keyframes fire-up {
            0% { transform: scale(0.8); box-shadow: 0 0 0px #ff9800; }
            50% { transform: scale(1.3); box-shadow: 0 0 40px #ff0000; z-index: 100; filter: saturate(200%); }
            100% { transform: scale(1); box-shadow: 0 0 10px #ff9800; }
        }

        .floating-text {
            position: absolute; color: var(--gold-bright); font-weight: bold; font-size: 16px;
            pointer-events: none; z-index: 200; animation: float-up 1s forwards;
            text-shadow: 0 2px 4px #000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            white-space: nowrap;
        }
        @keyframes float-up {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); }
        }

        /* Targeting Mode */
        .game-container.targeting .tile-container { pointer-events: auto; }
        .game-container.targeting .tile { cursor: crosshair; pointer-events: auto; transition: opacity 0.2s; }
        .game-container.targeting .tile:hover .tile-inner { border-color: var(--gold-bright); box-shadow: 0 0 20px var(--gold-bright); transform: scale(1.05); }
        #targeting-banner {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: var(--gold-bright); color: #000; padding: 5px 20px;
            border-radius: 15px; z-index: 200; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: none; display: none;
            white-space: nowrap; animation: float-bounce 2s infinite;
        }
        @keyframes float-bounce { 0%,100%{top:-30px;} 50%{top:-35px;} }

        /* 冰冻状态特效 */
        .tile.frozen .tile-inner {
            border-color: #00bcd4 !important;
            box-shadow: inset 0 0 15px rgba(0, 188, 212, 0.8), 0 0 10px rgba(0, 188, 212, 0.5) !important;
            background-color: rgba(0, 50, 80, 0.8) !important;
        }
        .tile.frozen::after { content: '❄️'; position: absolute; top: -8px; right: -8px; font-size: 20px; z-index: 20; animation: pulse-frozen 2s infinite; }
        @keyframes pulse-frozen { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }

        @keyframes appear { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .tile-val { position: absolute; top: 2px; left: 4px; font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 0 #000; z-index: 2; }
        .tile-img { width: 85%; height: 85%; image-rendering: pixelated; z-index: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.85)); }

        .t-2 { border-color: #5d4037; background: linear-gradient(135deg, #3e2723, #151515); }
        .t-4 { border-color: #8d6e63; background: linear-gradient(135deg, #4e342e, #151515); }
        .t-8 { border-color: #558b2f; background: linear-gradient(135deg, #33691e, #111); }
        .t-16 { border-color: #0288d1; background: linear-gradient(135deg, #01579b, #111); }
        .t-32 { border-color: #6a1b9a; background: linear-gradient(135deg, #4a148c, #111); }
        .t-64 { border-color: #e64a19; background: linear-gradient(135deg, #bf360c, #111); }
        .t-128, .t-256 { border-color: #8e24aa; background: linear-gradient(135deg, #311b92, #000); box-shadow: 0 0 10px rgba(142,36,170,0.5); }
        .t-512, .t-1024 { border-color: #e53935; background: linear-gradient(135deg, #b71c1c, #000); box-shadow: 0 0 15px rgba(229,57,53,0.6); }
        .t-2048, .t-4096 { border-color: #43a047; background: linear-gradient(135deg, #1b5e20, #000); box-shadow: 0 0 20px rgba(67,160,71,0.7); }
        .t-8192, .t-16384 { border-color: #ffb300; background: linear-gradient(135deg, #f57f17, #000); box-shadow: 0 0 25px rgba(255,179,0,0.8); }
        .t-32768, .t-65536 { border-color: #d50000; background: linear-gradient(135deg, #880e4f, #000); box-shadow: 0 0 35px rgba(213,0,0,0.9); }
        .t-131072, .t-262144 { border-color: #e0e0e0; background: linear-gradient(135deg, #ffffff, #424242); box-shadow: 0 0 40px #fff; }
        .t-524288, .t-1048576 { border-color: #ff00ff; background: linear-gradient(135deg, #4a148c, #000); box-shadow: 0 0 50px #ff00ff; animation: pulse 2s infinite; }
        .t-2097152 { border-color: #ffd700; background: linear-gradient(135deg, #ffd700, #ff0000, #000); box-shadow: 0 0 70px #ffd700; animation: pulse-epic 1.5s infinite; }

        /* Bestiary Book */
        .bestiary-section {
            width: 100%; max-width: 600px; margin-top: 30px;
            background: #1f1b1e; border: 2px solid #483a42; border-radius: 8px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .bestiary-title { color: var(--gold); text-align: center; margin-bottom: 5px; font-size: 20px; }
        .bestiary-subtitle { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 20px; border-bottom: 1px dashed #483a42; padding-bottom: 10px;}
        
        .bestiary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .book-entry {
            background: #2a2228; border: 2px solid #483a42; border-radius: 6px;
            padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; transition: all 0.2s; position: relative;
        }
        .book-entry:hover:not(.locked) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.8); border-color: var(--gold); }
        .book-entry.locked { filter: grayscale(100%) brightness(0.2); border-color: #111; cursor: not-allowed; }
        .book-entry.locked .entry-img { filter: contrast(0) brightness(0); }
        
        .book-entry.equipped { border-color: var(--gold-bright); background: #3a2c28; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .book-entry.equipped::after {
            content: "已装备"; position: absolute; top: -10px; right: -10px;
            background: var(--gold-bright); color: #000; font-size: 10px; font-weight: bold;
            padding: 2px 6px; border-radius: 4px; border: 1px solid #000; z-index: 5;
        }

        .entry-img {
            width: 64px; height: 64px; image-rendering: pixelated; margin-bottom: 8px;
            background: #110e0f; border-radius: 4px; padding: 4px; border: 1px solid #000;
        }
        .entry-name { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: 4px; }
        .entry-ability { font-size: 10px; color: #a5d6a7; line-height: 1.3; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; width: 100%; border: 1px dashed #558b2f;}

        .message-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,5,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
            border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .message-overlay.active { opacity: 1; pointer-events: all; }
        .message-overlay h2 { font-size: 36px; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 15px #ff0000; text-align: center; }
        
        .btn-restart-top {
            background: var(--btn-bg); color: var(--gold); border: 1px solid var(--gold);
            padding: 8px 30px; border-radius: 4px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-size: 14px; margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .bestiary-grid { grid-template-columns: repeat(2, 1fr); }
            .entry-img { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>DnD 2048</h1>
            <p>能力觉醒：流金岁月</p>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span>Score</span><strong id="score">0</strong></div>
            <div class="stat-box"><span>Best</span><strong id="best">0</strong></div>
            <div class="stat-box gold-box"><span>Gold</span><strong id="ui-gold">0</strong></div>
        </div>
    </header>

    <button class="btn-restart-top" id="btn-restart">↻ 重新试炼</button>

    <div class="ability-panel">
        <div class="ability-info">
            <div class="ability-icon" id="panel-ab-icon"></div>
            <div class="ability-text">
                <div class="ability-name" id="panel-ab-name">未选择能力</div>
                <div class="ability-desc" id="panel-ab-desc">在下方图鉴点击魔物以在下局装备</div>
            </div>
        </div>
        <button id="btn-use-ability" class="btn-use-ability" disabled>被动生效</button>
    </div>

    <!-- Gold Abilities -->
    <div class="gold-abilities">
        <button class="gold-btn" id="btn-g-kill">律令死亡 💀<br><span id="cost-kill">2G</span></button>
        <button class="gold-btn" id="btn-g-rewind">时光倒流 ⏳<br><span id="cost-rewind">2G</span></button>
        <button class="gold-btn" id="btn-g-swap">移形换影 🌀<br><span id="cost-swap">2G</span></button>
    </div>

    <div class="game-wrapper">
        <div class="game-container" id="game-container">
            <div id="targeting-banner">请选择目标</div>
            <div class="grid-background" id="grid-bg"></div>
            <div class="tile-container" id="tile-container"></div>
            <div class="message-overlay" id="message-overlay">
                <h2 id="msg-text">Game Over</h2>
                <button class="btn-use-ability ready" id="btn-msg-action" style="padding: 12px 30px; font-size: 16px;">继续挑战</button>
            </div>
        </div>
    </div>

    <div class="bestiary-section">
        <h2 class="bestiary-title">🗡️ 冒险者魔物指南</h2>
        <div class="bestiary-subtitle">随着合成将逐步解锁新魔物。点击已解锁的卡片在下局装备</div>
        <div class="bestiary-grid" id="bestiary-grid"></div>
    </div>

<script>

function generateSVG(val) {
    let pixels = MONSTERS[val]?.pixels;
    if(!pixels) return '';
    let rects = '';
    for(let y=0; y<16; y++) {
        for(let x=0; x<16; x++) {
            let char = pixels[y][x];
            if(char && char !== '.') rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${P[char]}" />`;
        }
    }
    return `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" class="tile-img">${rects}</svg>`;
}

// ---------------- 游戏引擎 ----------------
const SIZE = 5;
let board = [];
let tilesMap = {};
let score = 0;
let bestScore = localStorage.getItem('dnd2048Best_v9') || 0;
let totalGold = parseInt(localStorage.getItem('dnd2048Gold_v9')) || 0;
let history = []; 
let unlocked = JSON.parse(localStorage.getItem('dnd2048Unlocked_v9')) || [2, 4]; // 正常模式解锁

let nextTileId = 1;
let isAnimating = false;

// 瞄准系统重构
let isTargetingMode = false;
let targetingConfig = null; 

// 能力状态
let equippedAbilityId = localStorage.getItem('dnd2048Equipped_v9') || null; 
let currentAbilityId = null;  
let abilityCharge = 0;
let lichUsed = false;
let goldCosts = { kill: 2, rewind: 2, swap: 2 };

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const uiGold = document.getElementById('ui-gold');
const tileContainer = document.getElementById('tile-container');
const bestiaryGrid = document.getElementById('bestiary-grid');
const overlay = document.getElementById('message-overlay');
const msgText = document.getElementById('msg-text');
const gameContainer = document.getElementById('game-container');
const btnUseAbility = document.getElementById('btn-use-ability');
const targetingBanner = document.getElementById('targeting-banner');

function saveGameData() {
    const gameState = {
        board: board, score: score, nextTileId: nextTileId, history: history,
        currentAbilityId: currentAbilityId, abilityCharge: abilityCharge, 
        lichUsed: lichUsed, goldCosts: goldCosts
    };
    localStorage.setItem('dnd2048GameState_v9', JSON.stringify(gameState));
}

function initGame(forceRestart = false) {
    let savedState = null;
    if (!forceRestart) {
        try { savedState = JSON.parse(localStorage.getItem('dnd2048GameState_v9')); } catch(e) {}
    }

    if (savedState && savedState.board) {
        board = savedState.board;
        score = savedState.score || 0;
        history = savedState.history || [];
        nextTileId = savedState.nextTileId || 1;
        currentAbilityId = savedState.currentAbilityId || null;
        abilityCharge = savedState.abilityCharge || 0;
        lichUsed = savedState.lichUsed || false;
        goldCosts = savedState.goldCosts || { kill: 2, rewind: 2, swap: 2 };
    } else {
        board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        score = 0; nextTileId = 1; history = [];
        currentAbilityId = equippedAbilityId;
        abilityCharge = 0; lichUsed = false;
        goldCosts = { kill: 2, rewind: 2, swap: 2 };
    }

    tilesMap = {}; tileContainer.innerHTML = '';
    bestEl.innerText = bestScore; scoreEl.innerText = score; uiGold.innerText = totalGold; 
    isAnimating = false; cancelTargeting();
    
    const gridBg = document.getElementById('grid-bg');
    if(gridBg.children.length === 0) {
        for(let i=0; i<SIZE*SIZE; i++) {
            let cell = document.createElement('div'); cell.className = 'grid-cell'; gridBg.appendChild(cell);
        }
    }

    if (savedState && savedState.board) {
        for(let y=0; y<SIZE; y++) {
            for(let x=0; x<SIZE; x++) {
                if(board[y][x]) createTileDOM(board[y][x].id, board[y][x].val, x, y);
            }
        }
        updateFreezeUI();
    } else {
        addRandomTile(); addRandomTile(); saveGameData();
    }

    renderBestiary();
    updateAbilityUI();
}

function updateScore(add) {
    score += add; scoreEl.innerText = score;
    if (score > bestScore) {
        bestScore = score; bestEl.innerText = bestScore;
        localStorage.setItem('dnd2048Best_v9', bestScore);
    }
}

function getEmptyCells(currentBoard) {
    let cells = [];
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) if (!currentBoard[y][x]) cells.push({x, y});
    return cells;
}

function checkUnlock(val) {
    if (!unlocked.includes(val) && MONSTERS[val]) {
        unlocked.push(val);
        localStorage.setItem('dnd2048Unlocked_v9', JSON.stringify(unlocked));
        renderBestiary();
    }
}

function addRandomTile() {
    let emptyCells = getEmptyCells(board);
    if (emptyCells.length > 0) {
        let pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        let r = Math.random();
        let val = r < 0.9 ? 2 : 4;
        
        if (currentAbilityId == 2) val = r < 0.9 ? 2 : 4; 
        if (currentAbilityId == 32768) val = r < 0.333 ? 4 : (r < 0.666 ? 8 : 16);

        let id = nextTileId++;
        board[pos.y][pos.x] = { id, val, frozen: 0 };
        createTileDOM(id, val, pos.x, pos.y);
    }
}

function createTileDOM(id, val, x, y, isMerge = false, isCrit = false, isFireUp = false, isVampUp = false) {
    checkUnlock(val); // 检查是否解锁新魔物
    
    let el = document.createElement('div'); el.className = 'tile';
    if(isCrit) el.classList.add('crit');
    if(isFireUp) el.classList.add('fire-upgrade');
    if(isVampUp) el.classList.add('vampire-up');
    
    let inner = document.createElement('div'); inner.className = `tile-inner t-${val}`;
    inner.innerHTML = `<div class="tile-val">${val}</div>${generateSVG(val)}`;
    el.appendChild(inner);
    
    if (isCrit) {
        let ft = document.createElement('div'); ft.className = 'floating-text'; ft.innerText = 'CRIT!';
        el.appendChild(ft);
    }

    el.style.transform = `translate(${x * 111}%, ${y * 111}%)`;
    if(isMerge && !isCrit && !isFireUp && !isVampUp) el.classList.add('merged');
    
    tileContainer.appendChild(el);
    tilesMap[id] = { el, x, y, val };
}

function removeTileDOM(id, playVfx = false) {
    let tile = tilesMap[id];
    if (tile && tile.el.parentNode) {
        if (playVfx) {
            tile.el.classList.add('destroyed');
            setTimeout(() => {
                if (tile.el.parentNode) tile.el.parentNode.removeChild(tile.el);
                delete tilesMap[id];
            }, 300);
        } else {
            tile.el.parentNode.removeChild(tile.el);
            delete tilesMap[id];
        }
    }
}

function saveState() {
    let bCopy = board.map(row => row.map(c => c ? { ...c } : null)); 
    history.push({ board: bCopy, score: score, nextTileId: nextTileId, abilityCharge: abilityCharge, lichUsed: lichUsed, goldCosts: {...goldCosts} });
    if (history.length > 50) history.shift();
}

function updateFreezeUI() {
    for(let id in tilesMap) {
        let t = tilesMap[id];
        let cell = board[t.y][t.x];
        if (cell && cell.frozen > 0) t.el.classList.add('frozen');
        else t.el.classList.remove('frozen');
    }
}

function playAbilityVFX() {
    gameContainer.style.boxShadow = "inset 0 0 60px var(--gold-bright), 0 10px 40px rgba(0,0,0,0.9)";
    gameContainer.style.borderColor = "var(--gold-bright)";
    setTimeout(() => {
        gameContainer.style.boxShadow = "inset 0 0 30px rgba(0,0,0,0.9), 0 10px 30px rgba(0,0,0,0.8)";
        gameContainer.style.borderColor = "#362a30";
    }, 400);
}

// ---- 通用目标选择系统 ----
function startTargeting(prompt, validFn, count, onComplete) {
    isTargetingMode = true;
    targetingConfig = { prompt, validFn, count, targets: [], onComplete };
    gameContainer.classList.add('targeting');
    targetingBanner.style.display = 'block';
    updateTargetingBanner();
}

function cancelTargeting() {
    isTargetingMode = false; targetingConfig = null;
    gameContainer.classList.remove('targeting');
    targetingBanner.style.display = 'none';
    document.querySelectorAll('.tile').forEach(el => el.style.opacity = 1);
    updateAbilityUI();
}

function updateTargetingBanner() {
    if (!isTargetingMode) return;
    if (targetingConfig.count > 1) {
        targetingBanner.innerText = `${targetingConfig.prompt} (${targetingConfig.targets.length}/${targetingConfig.count})`;
    } else {
        targetingBanner.innerText = targetingConfig.prompt;
    }
}

gameContainer.addEventListener('click', (e) => {
    if (!isTargetingMode || !targetingConfig) return;
    let targetEl = e.target.closest('.tile');
    if (targetEl) {
        let t = Object.values(tilesMap).find(m => m.el === targetEl);
        if (t) {
            let cell = board[t.y][t.x];
            if (cell && targetingConfig.validFn(cell) && !targetingConfig.targets.some(m=>m.x===t.x&&m.y===t.y)) {
                targetingConfig.targets.push({x: t.x, y: t.y, cell: cell});
                t.el.style.opacity = 0.4;
                updateTargetingBanner();

                if (targetingConfig.targets.length >= targetingConfig.count) {
                    let onComplete = targetingConfig.onComplete;
                    let targets = targetingConfig.targets;
                    cancelTargeting();
                    onComplete(targets);
                }
            }
        }
    }
});


// ---- 金币能力逻辑 ----
function deductGold(amount) {
    totalGold -= amount;
    localStorage.setItem('dnd2048Gold_v9', totalGold);
    uiGold.innerText = totalGold;
}

document.getElementById('btn-g-kill').addEventListener('click', () => {
    if (isTargetingMode) { cancelTargeting(); return; }
    let cost = goldCosts.kill;
    if (totalGold < cost) return;
    
    if (!board.flat().some(c => c && c.val < 16384)) return;

    startTargeting("律令死亡：选择低于底栖魔鱼的魔物", c => c.val < 16384, 1, targets => {
        deductGold(cost);
        goldCosts.kill = Math.min(100, goldCosts.kill * 2);
        let tgt = targets[0];
        let id = board[tgt.y][tgt.x].id;
        board[tgt.y][tgt.x] = null;
        removeTileDOM(id, true);
        playAbilityVFX();
        updateAbilityUI();
        saveState(); saveGameData();
    });
});

document.getElementById('btn-g-rewind').addEventListener('click', () => {
    if (isTargetingMode) cancelTargeting();
    let cost = goldCosts.rewind;
    if (totalGold < cost || history.length === 0) return;
    
    deductGold(cost);
    // 独立计算回退费用，不随回退而重置
    let nextCost = Math.min(100, goldCosts.rewind * 2);
    let keptGoldCosts = {...goldCosts};
    keptGoldCosts.rewind = nextCost;
    
    let goBack = Math.min(10, history.length);
    let state;
    for(let i=0; i<goBack; i++) state = history.pop();

    board = state.board.map(row => row.map(c => c ? { ...c } : null));
    score = state.score; nextTileId = state.nextTileId;
    abilityCharge = state.abilityCharge; lichUsed = state.lichUsed;
    goldCosts = keptGoldCosts; 
    
    scoreEl.innerText = score;
    tileContainer.innerHTML = ''; tilesMap = {};
    for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) if(board[y][x]) createTileDOM(board[y][x].id, board[y][x].val, x, y);
    
    playAbilityVFX(); updateFreezeUI(); updateAbilityUI(); saveGameData();
});

document.getElementById('btn-g-swap').addEventListener('click', () => {
    if (isTargetingMode) { cancelTargeting(); return; }
    let cost = goldCosts.swap;
    if (totalGold < cost) return;
    
    if (board.flat().filter(c=>c).length < 2) return;

    startTargeting("移形换影：指定两个魔物进行交换", c => true, 2, targets => {
        deductGold(cost);
        goldCosts.swap = Math.min(100, goldCosts.swap * 2);
        
        let p1 = targets[0], p2 = targets[1];
        let t1 = board[p1.y][p1.x], t2 = board[p2.y][p2.x];
        board[p1.y][p1.x] = t2; board[p2.y][p2.x] = t1;
        
        let tile1 = tilesMap[t1.id];
        let tile2 = tilesMap[t2.id];
        
        tile1.x = p2.x; tile1.y = p2.y;
        tile2.x = p1.x; tile2.y = p1.y;
        
        tile1.el.style.transform = `translate(${tile1.x * 111}%, ${tile1.y * 111}%)`;
        tile2.el.style.transform = `translate(${tile2.x * 111}%, ${tile2.y * 111}%)`;
        
        tile1.el.classList.add('swap-anim');
        tile2.el.classList.add('swap-anim');
        tile1.el.style.zIndex = 50;
        tile2.el.style.zIndex = 50;
        
        setTimeout(() => {
            tile1.el.classList.remove('swap-anim');
            tile2.el.classList.remove('swap-anim');
            tile1.el.style.zIndex = 10;
            tile2.el.style.zIndex = 10;
        }, 500);
        
        updateFreezeUI(); updateAbilityUI(); saveState(); saveGameData();
    });
});


// ---- 魔物主动能力行为函数 ----

function abilityDestroyCond(condFunc, maxCount = 999, isVfx = true) {
    let cells = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] && condFunc(board[y][x].val)) cells.push({x,y, id: board[y][x].id});
    if(cells.length === 0) return false;
    cells.sort(() => Math.random() - 0.5);
    let count = 0;
    for(let i=0; i<Math.min(maxCount, cells.length); i++) {
        let p = cells[i]; board[p.y][p.x] = null; removeTileDOM(p.id, isVfx); count++;
    }
    return count > 0;
}

function abilityUpgradeCondMultiple(condFunc, count) {
    let cells = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] && condFunc(board[y][x].val)) cells.push({x,y, id: board[y][x].id, val: board[y][x].val});
    if(cells.length === 0) return false;
    cells.sort(() => Math.random() - 0.5);
    let upgraded = 0;
    for(let i=0; i<Math.min(count, cells.length); i++) {
        let p = cells[i]; removeTileDOM(p.id, false);
        let newVal = p.val * 2; let newId = nextTileId++;
        board[p.y][p.x] = {id: newId, val: newVal, frozen: 0}; createTileDOM(newId, newVal, p.x, p.y);
        upgraded++;
    }
    return upgraded > 0;
}

function abilitySwapTwo() {
    let coords = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x]) coords.push({x,y});
    if(coords.length < 2) return false;
    let i1 = Math.floor(Math.random() * coords.length), i2 = Math.floor(Math.random() * coords.length);
    while(i1 === i2) i2 = Math.floor(Math.random() * coords.length);
    let p1 = coords[i1], p2 = coords[i2];
    let t1 = board[p1.y][p1.x], t2 = board[p2.y][p2.x];
    board[p1.y][p1.x] = t2; board[p2.y][p2.x] = t1;
    
    let tile1 = tilesMap[t1.id];
    let tile2 = tilesMap[t2.id];
    
    tile1.x = p2.x; tile1.y = p2.y;
    tile2.x = p1.x; tile2.y = p1.y;
    
    tile1.el.style.transform = `translate(${tile1.x * 111}%, ${tile1.y * 111}%)`;
    tile2.el.style.transform = `translate(${tile2.x * 111}%, ${tile2.y * 111}%)`;
    
    tile1.el.classList.add('swap-anim');
    tile2.el.classList.add('swap-anim');
    tile1.el.style.zIndex = 50;
    tile2.el.style.zIndex = 50;
    
    setTimeout(() => {
        tile1.el.classList.remove('swap-anim');
        tile2.el.classList.remove('swap-anim');
        tile1.el.style.zIndex = 10;
        tile2.el.style.zIndex = 10;
    }, 500);
    
    updateFreezeUI();
    return true;
}

function abilityShuffle() {
    let tiles = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x]) { tiles.push(board[y][x]); board[y][x] = null; }
    if(tiles.length === 0) return false;
    for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    tileContainer.innerHTML = ''; tilesMap = {};
    let idx = 0;
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) {
        if (idx < tiles.length) {
            let t = tiles[idx++]; board[y][x] = t; createTileDOM(t.id, t.val, x, y);
            let newlyCreated = tilesMap[t.id];
            if(newlyCreated) newlyCreated.el.classList.add('shuffle-anim');
        }
    }
    setTimeout(() => {
        document.querySelectorAll('.shuffle-anim').forEach(el => el.classList.remove('shuffle-anim'));
    }, 500);
    updateFreezeUI();
    return true;
}

function abilityVampire() {
    let maxVal = Math.max(...board.flat().filter(c=>c).map(c=>c.val));
    let validTargets = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] && board[y][x].val < maxVal) validTargets.push({x,y, id: board[y][x].id, val: board[y][x].val});
    if (validTargets.length === 0) return false;
    
    validTargets.sort(() => Math.random() - 0.5);
    let destroyTarget = validTargets.pop();
    board[destroyTarget.y][destroyTarget.x] = null; removeTileDOM(destroyTarget.id, true);
    
    if (validTargets.length > 0) {
        let upTarget = validTargets.pop();
        removeTileDOM(upTarget.id, false);
        let newId = nextTileId++;
        board[upTarget.y][upTarget.x] = {id: newId, val: upTarget.val * 2, frozen: 0};
        createTileDOM(newId, upTarget.val * 2, upTarget.x, upTarget.y, false, false, false, true);
    }
    return true;
}

// 主动技能按钮逻辑
btnUseAbility.addEventListener('click', () => {
    if (!currentAbilityId || isAnimating) return;
    if (isTargetingMode) { cancelTargeting(); return; }

    let m = MONSTERS[currentAbilityId];
    if (m.ability.type !== 'active' || abilityCharge < m.ability.cd) return;

    // --- 瞄准类主动技能 ---
    if (currentAbilityId == 4) {
        if (!board.flat().some(c => c && c.val === 4)) return; 
        startTargeting("伏击：选择1个狗头人", c => c.val === 4, 1, tgts => {
            let k = tgts[0]; let adjs = [];
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
                let ny = k.y+d[0], nx = k.x+d[1];
                if(ny>=0 && ny<SIZE && nx>=0 && nx<SIZE && board[ny][nx]) adjs.push({x:nx, y:ny, id: board[ny][nx].id});
            });
            if(adjs.length > 0) {
                let adj = adjs[Math.floor(Math.random()*adjs.length)];
                board[adj.y][adj.x] = null; removeTileDOM(adj.id, true);
                let newId = nextTileId++; board[adj.y][adj.x] = {id: newId, val: 4, frozen: 0};
                createTileDOM(newId, 4, adj.x, adj.y);
                executeAbilityFinish();
            }
        }); return;
    }
    if (currentAbilityId == 8) {
        if (!board.flat().some(c => c && c.val === 8)) return;
        startTargeting("剔除弱者：选择1个哥布林", c => c.val === 8, 1, tgts => {
            let k = tgts[0]; let adjs = [];
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
                let ny = k.y+d[0], nx = k.x+d[1];
                if(ny>=0 && ny<SIZE && nx>=0 && nx<SIZE && board[ny][nx]) {
                    if (board[ny][nx].val === 2 || board[ny][nx].val === 4) {
                        adjs.push({x:nx, y:ny, id: board[ny][nx].id});
                    }
                }
            });
            if (adjs.length > 0) {
                adjs.forEach(adj => {
                    board[adj.y][adj.x] = null;
                    removeTileDOM(adj.id, true);
                });
            }
            executeAbilityFinish();
        }); return;
    }
    if (currentAbilityId == 16) {
        if (!board.flat().some(c => c && c.frozen <= 0)) return;
        startTargeting("寒气凝结：选择1个魔物冻结", c => c.frozen <= 0, 1, tgts => {
            board[tgts[0].y][tgts[0].x].frozen = 5; updateFreezeUI(); executeAbilityFinish();
        }); return;
    }
    if (currentAbilityId == 32) {
        if (!board.flat().some(c => c && c.val === 32)) return;
        startTargeting("同类相食：选择1个食尸鬼", c => c.val === 32, 1, tgts => {
            let g = tgts[0];
            [[0,1], [0,-1], [1,0], [-1,0]].forEach(d => {
                let ny = g.y + d[0], nx = g.x + d[1];
                if(ny>=0 && ny<SIZE && nx>=0 && nx<SIZE && board[ny][nx]) {
                    removeTileDOM(board[ny][nx].id, true);
                    board[ny][nx] = null;
                }
            });
            removeTileDOM(board[g.y][g.x].id, false);
            let newId = nextTileId++;
            board[g.y][g.x] = {id: newId, val: 64, frozen: 0};
            createTileDOM(newId, 64, g.x, g.y);
            executeAbilityFinish();
        }); return;
    }
    if (currentAbilityId == 1024) {
        let count = board.flat().filter(c => c && c.frozen <= 0).length;
        if (count === 0) return;
        startTargeting("石化凝视：冻结", c => c.frozen <= 0, Math.min(4, count), tgts => {
            tgts.forEach(t => board[t.y][t.x].frozen = 3); updateFreezeUI(); executeAbilityFinish();
        }); return;
    }
    if (currentAbilityId == 16384) {
        if (!board.flat().some(c => c && c.val <= 8192)) return;
        startTargeting("远古低语：选择不高于云巨人的魔物升级", c => c.val <= 8192, 1, tgts => {
            let p = tgts[0]; removeTileDOM(board[p.y][p.x].id, false);
            let newVal = p.cell.val * 2; let newId = nextTileId++;
            board[p.y][p.x] = {id: newId, val: newVal, frozen: 0};
            createTileDOM(newId, newVal, p.x, p.y); executeAbilityFinish();
        }); return;
    }

    // --- 瞬发类主动技能 ---
    let success = false;
    if (currentAbilityId == 64) success = abilityDestroyCond(v => v <= 16, 2, true);
    else if (currentAbilityId == 128) success = abilitySwapTwo();
    else if (currentAbilityId == 256) success = abilityDestroyCond(v => v <= 128, 5, true); 
    else if (currentAbilityId == 4096) success = abilityShuffle();
    else if (currentAbilityId == 8192) success = abilityUpgradeCondMultiple(v => v <= 2048, 3);
    else if (currentAbilityId == 65536) success = abilityVampire();
    else if (currentAbilityId == 131072) success = abilityDestroyCond(v => true, 1, true);
    else if (currentAbilityId == 1048576) {
        let maxVal = Math.max(...board.flat().filter(c=>c).map(c=>c.val));
        success = abilityDestroyCond(v => v < maxVal, 999, true);
    }

    if (success) {
        let skipGlobal = [128, 4096, 65536].includes(currentAbilityId);
        executeAbilityFinish(skipGlobal);
    }
});

function executeAbilityFinish(skipGlobalVFX = false) {
    if(!skipGlobalVFX) playAbilityVFX();
    abilityCharge = 0; updateAbilityUI(); saveGameData();
}

function updateAbilityUI() {
    // Gold Abilities
    document.getElementById('cost-kill').innerText = `${goldCosts.kill}G`;
    document.getElementById('btn-g-kill').disabled = totalGold < goldCosts.kill;
    document.getElementById('cost-rewind').innerText = `${goldCosts.rewind}G`;
    document.getElementById('btn-g-rewind').disabled = totalGold < goldCosts.rewind || history.length === 0;
    document.getElementById('cost-swap').innerText = `${goldCosts.swap}G`;
    document.getElementById('btn-g-swap').disabled = totalGold < goldCosts.swap;

    if (isTargetingMode) return; 

    const icon = document.getElementById('panel-ab-icon'), name = document.getElementById('panel-ab-name'), desc = document.getElementById('panel-ab-desc');
    if (currentAbilityId && MONSTERS[currentAbilityId]) {
        let m = MONSTERS[currentAbilityId];
        icon.innerHTML = generateSVG(currentAbilityId);
        name.innerText = `${m.name} - ${m.ability.name}`;
        desc.innerText = m.ability.desc;
        if (m.ability.type === 'active') {
            if (abilityCharge >= m.ability.cd) {
                btnUseAbility.innerText = `发动技能！`; btnUseAbility.className = 'btn-use-ability ready'; btnUseAbility.disabled = false;
            } else {
                btnUseAbility.innerText = `充能中 (${abilityCharge}/${m.ability.cd})`; btnUseAbility.className = 'btn-use-ability'; btnUseAbility.disabled = true;
            }
        } else {
            btnUseAbility.innerText = `被动生效中`; btnUseAbility.className = 'btn-use-ability'; btnUseAbility.disabled = true;
        }
    } else {
        icon.innerHTML = ''; name.innerText = '未选择能力'; desc.innerText = '在下方图鉴点击魔物以在下局装备';
        btnUseAbility.innerText = '无能力'; btnUseAbility.className = 'btn-use-ability'; btnUseAbility.disabled = true;
    }
}

function renderBestiary() {
    bestiaryGrid.innerHTML = '';
    const sortedKeys = Object.keys(MONSTERS).map(Number).sort((a,b)=>a-b);
    sortedKeys.forEach(val => {
        let isUnlocked = unlocked.includes(val); let data = MONSTERS[val];
        let entry = document.createElement('div');
        let isEquipped = (val == equippedAbilityId);
        entry.className = `book-entry ${isUnlocked ? '' : 'locked'} ${isEquipped ? 'equipped' : ''}`;
        entry.innerHTML = `
            <div class="entry-img">${generateSVG(val)}</div>
            <div class="entry-name">${isUnlocked ? data.name : '???'}</div>
            ${isUnlocked && data.ability ? `<div class="entry-ability"><b>${data.ability.type=='active'?'[主动]':'[被动]'} ${data.ability.name} ${data.ability.type=='active'?'(CD:'+data.ability.cd+')':''}</b><br>${data.ability.desc}</div>` : ''}
            <div style="font-size:10px; color:#666; margin-top:auto; padding-top:5px;">LV. ${val}</div>
        `;
        if (isUnlocked) {
            entry.addEventListener('click', () => {
                equippedAbilityId = val; localStorage.setItem('dnd2048Equipped_v9', val);
                renderBestiary();
                let oldText = document.querySelector('.bestiary-subtitle').innerText;
                document.querySelector('.bestiary-subtitle').innerText = `已预设：${data.name} (将在点击“重新试炼”时生效)`;
                document.querySelector('.bestiary-subtitle').style.color = 'var(--gold-bright)';
                setTimeout(() => { document.querySelector('.bestiary-subtitle').innerText = '随着合成将逐步解锁新魔物。点击已解锁的卡片在下局装备'; document.querySelector('.bestiary-subtitle').style.color = 'var(--text-muted)'; }, 3000);
            });
        }
        bestiaryGrid.appendChild(entry);
    });
}

function move(direction) {
    if (isAnimating || overlay.classList.contains('active')) return;
    
    if (isTargetingMode) cancelTargeting();
    
    let vector = { 'up': {x:0,y:-1}, 'down': {x:0,y:1}, 'left': {x:-1,y:0}, 'right': {x:1,y:0} }[direction];
    let traX = Array.from({length: SIZE}, (_,i)=>i); let traY = Array.from({length: SIZE}, (_,i)=>i);
    if (vector.x === 1) traX.reverse(); if (vector.y === 1) traY.reverse();

    let newBoard = board.map(row => row.map(c => c ? { ...c } : null));
    let mergedMap = Array(SIZE).fill().map(()=>Array(SIZE).fill(false));
    let moved = false; let scoreAdd = 0; let moves = []; let creates = [];

    for (let y of traY) {
        for (let x of traX) {
            let cell = newBoard[y][x];
            if (cell) {
                if (cell.frozen > 0) continue; 

                let currX = x, currY = y; let nextX = x + vector.x, nextY = y + vector.y;
                while (nextX>=0 && nextX<SIZE && nextY>=0 && nextY<SIZE && newBoard[nextY][nextX] === null) {
                    currX = nextX; currY = nextY; nextX += vector.x; nextY += vector.y;
                }
                
                if (nextX>=0 && nextX<SIZE && nextY>=0 && nextY<SIZE && newBoard[nextY][nextX] !== null && 
                    newBoard[nextY][nextX].val === cell.val && !mergedMap[nextY][nextX] && !(newBoard[nextY][nextX].frozen > 0)) {
                    
                    let target = newBoard[nextY][nextX]; newBoard[y][x] = null;
                    let newVal = target.val * 2;
                    let isCrit = false;
                    let isFireUp = false;
                    
                    // 彩蛋：双提亚马特降级为洞穴鼠
                    if (target.val === 2097152) {
                        newVal = 2;
                    } else {
                        if ((currentAbilityId == 2048 && Math.random() < 0.05) || (currentAbilityId == 262144 && Math.random() < 0.1)) {
                            newVal *= 2; isCrit = true;
                            if (currentAbilityId == 262144) deductGold(-1); // +1 Gold
                        }
                        
                        // 被动：火元素合成燃焰之颅直接变火元素
                        if (currentAbilityId == 512 && newVal === 256) {
                            newVal = 512;
                            isFireUp = true;
                        }
                    }
                    
                    if (newVal === 524288) {
                        lichUsed = false; 
                        goldCosts = {kill: 2, rewind: 2, swap: 2};
                    }

                    let newId = nextTileId++;
                    newBoard[nextY][nextX] = { id: newId, val: newVal, frozen: 0 };
                    mergedMap[nextY][nextX] = true; scoreAdd += newVal; moved = true;

                    moves.push({ id: cell.id, toX: nextX, toY: nextY, destroy: true });
                    moves.push({ id: target.id, toX: nextX, toY: nextY, destroy: true });
                    creates.push({ id: newId, val: newVal, x: nextX, y: nextY, crit: isCrit, fireUp: isFireUp });
                } else if (currX !== x || currY !== y) {
                    newBoard[currY][currX] = cell; newBoard[y][x] = null; moved = true;
                    moves.push({ id: cell.id, toX: currX, toY: currY, destroy: false });
                }
            }
        }
    }

    if (moved) {
        isAnimating = true; saveState();
        
        for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) {
            if(newBoard[y][x] && newBoard[y][x].frozen > 0) newBoard[y][x].frozen--;
        }

        board = newBoard; updateScore(scoreAdd);
        abilityCharge++; updateAbilityUI();

        // 终极判定
        let hasTiamat = board.flat().some(c => c && c.val === 2097152);
        if (currentAbilityId == 2097152 && hasTiamat) {
            for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) {
                if(!board[y][x] || board[y][x].val !== 2097152) {
                    if (board[y][x]) removeTileDOM(board[y][x].id, true);
                    let newId = nextTileId++; board[y][x] = {id: newId, val: 2097152, frozen: 0};
                    createTileDOM(newId, 2097152, x, y);
                }
            }
            setTimeout(() => { showMsg('🏆 神圣干涉', '恶龙神后降临，世界迎来终结与新生！\n金币已结算'); handleGameOverGold(); document.getElementById('btn-msg-action').innerText = "重获新生"; }, 500);
            return;
        }

        moves.forEach(m => {
            let t = tilesMap[m.id];
            if (t) { t.x = m.toX; t.y = m.toY; t.el.style.transform = `translate(${t.x * 111}%, ${t.y * 111}%)`; if (m.destroy) t.el.style.zIndex = "5"; }
        });

        setTimeout(() => {
            moves.filter(m => m.destroy).forEach(m => removeTileDOM(m.id, false));
            creates.forEach(c => createTileDOM(c.id, c.val, c.x, c.y, true, c.crit, c.fireUp));
            updateFreezeUI(); addRandomTile(); saveGameData();
            checkGameOverAction();
            isAnimating = false;
        }, 150);
    }
}

function handleGameOverGold() {
    let baseGold = Math.floor(Math.sqrt(score));
    let multi = 1;
    if (currentAbilityId == 64) multi += 0.1;
    if (currentAbilityId == 8192) multi += 0.25;
    let earnedGold = Math.floor(baseGold * multi);
    
    totalGold += earnedGold;
    localStorage.setItem('dnd2048Gold_v9', totalGold);
    uiGold.innerText = totalGold;
    return earnedGold;
}

function checkGameOverAction() {
    let isOver = true;
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            if (board[y][x] === null) { isOver = false; continue; }
            if (x < SIZE - 1 && board[y][x+1] && board[y][x].val === board[y][x+1].val && !(board[y][x].frozen > 0 || board[y][x+1].frozen > 0)) isOver = false;
            if (y < SIZE - 1 && board[y+1][x] && board[y][x].val === board[y+1][x].val && !(board[y][x].frozen > 0 || board[y+1][x].frozen > 0)) isOver = false;
        }
    }
    if (isOver) {
        if (currentAbilityId == 524288 && !lichUsed) {
            lichUsed = true;
            let maxVal = Math.max(...board.flat().filter(c=>c).map(c=>c.val));
            abilityDestroyCond(v => v !== maxVal, 999, true);
            goldCosts = {kill: 2, rewind: 2, swap: 2};
            playAbilityVFX(); updateAbilityUI(); saveGameData();
            showMsg('命匣存储生效', '巫妖的命匣为你重塑了肉身\n全场低级魔物已献祭，金币花费重置！');
            setTimeout(() => { overlay.classList.remove('active'); }, 2500);
            return;
        }
        let earned = handleGameOverGold();
        showMsg('试炼结束', `你的冒险止步于此\n本次获得金币: ${earned} 🪙`);
    }
}

function showMsg(title, sub) {
    msgText.innerText = title;
    let p = document.createElement('p'); p.innerText = sub; p.style.color="#8c8279"; p.style.fontSize="16px"; p.style.marginBottom="20px"; p.style.textAlign="center"; p.style.lineHeight="1.5";
    if(msgText.nextSibling.tagName === 'P') msgText.nextSibling.remove();
    msgText.parentNode.insertBefore(p, msgText.nextSibling);
    overlay.classList.add('active');
}

document.addEventListener('keydown', e => {
    const key = e.key;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) { e.preventDefault(); move(key.replace('Arrow', '').toLowerCase()); } 
    else if (['w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(key)) {
        e.preventDefault(); const wasdMap = { 'w': 'up', 'W': 'up', 's': 'down', 'S': 'down', 'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right' };
        move(wasdMap[key]);
    }
});

let touchStartX = 0, touchStartY = 0;
gameContainer.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive: true});
gameContainer.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false});
gameContainer.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - touchStartX; let dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
});

document.getElementById('btn-restart').addEventListener('click', () => { overlay.classList.remove('active'); localStorage.removeItem('dnd2048GameState_v9'); initGame(true); });
document.getElementById('btn-msg-action').addEventListener('click', () => { overlay.classList.remove('active'); localStorage.removeItem('dnd2048GameState_v9'); initGame(true); });

initGame();
</script>
