<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙与地下城 2048：连携觉醒版</title>
    <style>
        :root {
            --bg-color: #0c0b0e; --panel-bg: #1a171c; --text-main: #e6e1d8;
            --text-muted: #8c8279; --gold: #dfb15b; --gold-bright: #ffd700;
            --grid-bg: #1c181a; --cell-bg: #110e0f;
            --btn-bg: linear-gradient(180deg, #382c33 0%, #1e171b 100%);
            --synergy-color: #e040fb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: var(--bg-color); background-image: linear-gradient(135deg, #161218 0%, #060507 100%);
            color: var(--text-main); font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; padding: 20px 10px;
        }

        header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title-area h1 { color: var(--gold); font-size: 26px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px; }
        .title-area p { font-size: 13px; color: var(--text-muted); }

        .stats-area { display: flex; gap: 8px; }
        .stat-box { background: linear-gradient(180deg, #2a2228 0%, #171316 100%); border: 1px solid #483a42; padding: 5px 10px; border-radius: 6px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.6); min-width: 55px; }
        .stat-box span { display: block; font-size: 10px; color: var(--gold); text-transform: uppercase; }
        .stat-box strong { font-size: 15px; color: #fff; }
        .stat-box.gold-box strong { color: var(--gold-bright); text-shadow: 0 0 5px rgba(255,215,0,0.5); }

        /* Synergies Panel (Moved to top) */
        .synergies-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .synergy-box { 
            background: linear-gradient(135deg, #2a1b2e, #130a18); border: 1px solid var(--synergy-color); border-radius: 6px; padding: 8px 12px; 
            box-shadow: 0 0 10px rgba(224, 64, 251, 0.3); display: none; animation: appear 0.3s forwards;
        }
        .synergy-box.active { display: block; }
        .synergy-header { font-size: 13px; font-weight: bold; color: var(--synergy-color); margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center;}
        .synergy-desc { font-size: 11px; color: #d1c4e9; line-height: 1.3; }
        .synergy-tag { font-size: 9px; background: var(--synergy-color); color: #000; padding: 2px 5px; border-radius: 4px; }

        /* Multi-Slot Panel */
        .slots-container { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .slot { 
            flex: 1; background: #1f1b1e; border: 1px solid #483a42; border-radius: 6px; padding: 8px 4px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6); min-height: 85px; position: relative; transition: all 0.2s;
        }
        .slot.equipped { border-color: var(--gold); background: #2a2228; }
        .slot.locked { border-color: #333; background: #111; cursor: pointer; opacity: 0.8; justify-content: center;}
        .slot.locked:hover { border-color: var(--gold-bright); opacity: 1; }
        .slot.empty { justify-content: center; color: var(--text-muted); font-size: 12px; }
        
        .slot-icon { width: 32px; height: 32px; background: #000; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
        .slot-icon svg { width: 80%; height: 80%; image-rendering: pixelated; }
        .slot-name { font-size: 11px; font-weight: bold; color: var(--gold-bright); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        
        .slot-btn {
            background: var(--btn-bg); color: #aaa; border: 1px solid #444; padding: 4px 0; width: 100%;
            border-radius: 3px; font-weight: bold; font-family: inherit; font-size: 10px; margin-top: 4px;
        }
        .slot-btn.ready {
            background: linear-gradient(180deg, #558b2f 0%, #33691e 100%); color: #fff; border-color: #8bc34a; cursor: pointer;
            box-shadow: 0 0 8px rgba(139, 195, 74, 0.5); animation: pulse-btn 1.5s infinite;
        }
        .slot-btn.ready:active { transform: translateY(2px); }

        .lock-icon { font-size: 20px; margin-bottom: 5px; }
        .lock-price { font-size: 10px; color: var(--gold-bright); font-weight: bold; text-align: center;}

        /* Gold Abilities */
        .gold-abilities { width: 100%; max-width: 500px; display: flex; gap: 8px; margin-bottom: 15px; }
        .gold-btn {
            flex: 1; background: linear-gradient(180deg, #3c2a1a 0%, #201308 100%); color: var(--gold-bright); border: 1px solid #8a6a3b; padding: 8px 0;
            border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gold-btn:hover:not(:disabled) { background: #4a3622; border-color: var(--gold-bright); }
        .gold-btn:active:not(:disabled) { transform: translateY(2px); }
        .gold-btn:disabled { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        .gold-btn span { font-size: 10px; color: #fff; margin-top: 2px; }

        @keyframes pulse-btn { 0%, 100% { box-shadow: 0 0 3px rgba(139,195,74,0.5); } 50% { box-shadow: 0 0 10px rgba(139,195,74,1); } }

        .btn-restart-top { background: var(--btn-bg); color: var(--gold); border: 1px solid var(--gold); padding: 8px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-size: 14px; margin-bottom: 15px; }

        /* Game Board */
        .game-wrapper { position: relative; width: 100%; max-width: 500px; }
        .game-container {
            position: relative; width: 100%; aspect-ratio: 1 / 1; background: var(--grid-bg); border-radius: 8px;
            border: 3px solid #362a30; padding: 2%; box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 10px 30px rgba(0,0,0,0.8); transition: box-shadow 0.3s;
        }
        .grid-background { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 2%; width: 100%; height: 100%; }
        .grid-cell { background: var(--cell-bg); border-radius: 4px; box-shadow: inset 0 0 8px rgba(0,0,0,0.8); }
        .tile-container { position: absolute; top: 2%; left: 2%; right: 2%; bottom: 2%; pointer-events: none; }
        .tile { position: absolute; width: 18.4%; height: 18.4%; transition: transform 0.15s ease-in-out; z-index: 10; }
        .tile-inner {
            width: 100%; height: 100%; border-radius: 6px; display: flex; justify-content: center; align-items: center;
            position: relative; animation: appear 0.2s forwards; box-shadow: 0 4px 8px rgba(0,0,0,0.6); overflow: hidden;
            border: 2px solid #333; background-color: var(--panel-bg);
        }
        .tile.merged .tile-inner { animation: pop 0.2s forwards; }

        /* VFX Animations */
        @keyframes shatter { 0% { transform: scale(1); opacity: 1; filter: brightness(1) sepia(0); } 50% { transform: scale(1.3); opacity: 0.8; filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(500%); } 100% { transform: scale(0); opacity: 0; filter: brightness(0); } }
        .tile.destroyed .tile-inner { animation: shatter 0.3s forwards !important; border-color: #ff0000 !important; }
        @keyframes crit-pop { 0% { transform: scale(0.8); box-shadow: 0 0 0px var(--gold-bright); } 50% { transform: scale(1.3); box-shadow: 0 0 40px var(--gold-bright); z-index: 100;} 100% { transform: scale(1); box-shadow: 0 0 10px var(--gold-bright); } }
        .tile.crit .tile-inner { animation: crit-pop 0.6s forwards !important; border-color: var(--gold-bright) !important; }
        .tile.shuffle-anim .tile-inner { animation: shuffle-vfx 0.4s ease-in-out forwards !important; }
        @keyframes shuffle-vfx { 0% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(0.6) rotate(180deg); opacity: 0.7; filter: blur(1px); } 100% { transform: scale(1) rotate(360deg); opacity: 1; } }
        .tile.swap-anim .tile-inner { animation: swap-vfx 0.5s ease-in-out forwards !important; border-color: #00bcd4 !important; }
        @keyframes swap-vfx { 0% { box-shadow: 0 0 0 #00bcd4; } 50% { box-shadow: 0 0 30px #00bcd4, 0 0 10px #fff; transform: scale(1.15) rotate(5deg); } 100% { box-shadow: 0 0 0 #00bcd4; } }
        .tile.vampire-up .tile-inner { animation: vamp-up-vfx 0.6s forwards !important; border-color: #b71c1c !important; }
        @keyframes vamp-up-vfx { 0% { box-shadow: 0 0 0 #b71c1c; } 50% { box-shadow: 0 0 40px #b71c1c, 0 0 20px #ff0000; transform: scale(1.25); z-index: 100; } 100% { box-shadow: 0 0 10px #b71c1c; } }
        .tile.fire-upgrade .tile-inner { animation: fire-up 0.6s forwards !important; border-color: #ff9800 !important; }
        @keyframes fire-up { 0% { transform: scale(0.8); box-shadow: 0 0 0px #ff9800; } 50% { transform: scale(1.3); box-shadow: 0 0 40px #ff0000; z-index: 100; filter: saturate(200%); } 100% { transform: scale(1); box-shadow: 0 0 10px #ff9800; } }

        .floating-text { position: absolute; font-weight: bold; font-size: 16px; pointer-events: none; z-index: 200; animation: float-up 1s forwards; text-shadow: 0 2px 4px #000; transform: translate(-50%, -50%); white-space: nowrap; }
        @keyframes float-up { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -200%) scale(1.5); } }

        /* Targeting Mode */
        .game-container.targeting .tile-container { pointer-events: auto; }
        .game-container.targeting .tile { cursor: crosshair; pointer-events: auto; transition: opacity 0.2s; }
        .game-container.targeting .tile:hover .tile-inner { border-color: var(--gold-bright); box-shadow: 0 0 20px var(--gold-bright); transform: scale(1.05); }
        #targeting-banner {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: var(--gold-bright); color: #000; padding: 5px 20px;
            border-radius: 15px; z-index: 200; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: none; display: none;
            white-space: nowrap; animation: float-bounce 2s infinite;
        }
        @keyframes float-bounce { 0%,100%{top:-30px;} 50%{top:-35px;} }

        /* 冰冻状态 */
        .tile.frozen .tile-inner { border-color: #00bcd4 !important; box-shadow: inset 0 0 15px rgba(0, 188, 212, 0.8), 0 0 10px rgba(0, 188, 212, 0.5) !important; background-color: rgba(0, 50, 80, 0.8) !important; }
        .tile.frozen::after { content: '❄️'; position: absolute; top: -8px; right: -8px; font-size: 20px; z-index: 20; animation: pulse-frozen 2s infinite; }
        @keyframes pulse-frozen { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
        @keyframes appear { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .tile-val { position: absolute; top: 2px; left: 4px; font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 0 #000; z-index: 2; }
        .tile-img { width: 85%; height: 85%; image-rendering: pixelated; z-index: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.85)); }

        .t-2 { border-color: #5d4037; background: linear-gradient(135deg, #3e2723, #151515); } .t-4 { border-color: #8d6e63; background: linear-gradient(135deg, #4e342e, #151515); } .t-8 { border-color: #558b2f; background: linear-gradient(135deg, #33691e, #111); } .t-16 { border-color: #0288d1; background: linear-gradient(135deg, #01579b, #111); } .t-32 { border-color: #6a1b9a; background: linear-gradient(135deg, #4a148c, #111); } .t-64 { border-color: #e64a19; background: linear-gradient(135deg, #bf360c, #111); }
        .t-128, .t-256 { border-color: #8e24aa; background: linear-gradient(135deg, #311b92, #000); box-shadow: 0 0 10px rgba(142,36,170,0.5); } .t-512, .t-1024 { border-color: #e53935; background: linear-gradient(135deg, #b71c1c, #000); box-shadow: 0 0 15px rgba(229,57,53,0.6); } .t-2048, .t-4096 { border-color: #43a047; background: linear-gradient(135deg, #1b5e20, #000); box-shadow: 0 0 20px rgba(67,160,71,0.7); } .t-8192, .t-16384 { border-color: #ffb300; background: linear-gradient(135deg, #f57f17, #000); box-shadow: 0 0 25px rgba(255,179,0,0.8); } .t-32768, .t-65536 { border-color: #d50000; background: linear-gradient(135deg, #880e4f, #000); box-shadow: 0 0 35px rgba(213,0,0,0.9); } .t-131072, .t-262144 { border-color: #e0e0e0; background: linear-gradient(135deg, #ffffff, #424242); box-shadow: 0 0 40px #fff; } .t-524288, .t-1048576 { border-color: #ff00ff; background: linear-gradient(135deg, #4a148c, #000); box-shadow: 0 0 50px #ff00ff; animation: pulse 2s infinite; } .t-2097152 { border-color: #ffd700; background: linear-gradient(135deg, #ffd700, #ff0000, #000); box-shadow: 0 0 70px #ffd700; animation: pulse-epic 1.5s infinite; }

        /* Bestiary Book */
        .bestiary-section { width: 100%; max-width: 600px; margin-top: 30px; background: #1f1b1e; border: 2px solid #483a42; border-radius: 8px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .bestiary-title { color: var(--gold); text-align: center; margin-bottom: 5px; font-size: 20px; }
        .bestiary-subtitle { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 20px; border-bottom: 1px dashed #483a42; padding-bottom: 10px;}
        .bestiary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .book-entry { background: #2a2228; border: 2px solid #483a42; border-radius: 6px; padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; transition: all 0.2s; position: relative; }
        .book-entry:hover:not(.locked) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.8); border-color: var(--gold); }
        .book-entry.locked { filter: grayscale(100%) brightness(0.2); border-color: #111; cursor: not-allowed; }
        .book-entry.locked .entry-img { filter: contrast(0) brightness(0); }
        .book-entry.equipped { border-color: var(--gold-bright); background: #3a2c28; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .book-entry.equipped::after { content: "已装备"; position: absolute; top: -10px; right: -10px; background: var(--gold-bright); color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; border: 1px solid #000; z-index: 5; }

        .entry-img { width: 64px; height: 64px; image-rendering: pixelated; margin-bottom: 8px; background: #110e0f; border-radius: 4px; padding: 4px; border: 1px solid #000; }
        .entry-name { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: 4px; }
        .entry-ability { font-size: 10px; color: #a5d6a7; line-height: 1.3; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 4px; width: 100%; border: 1px dashed #558b2f;}

        .message-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5,5,5,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .message-overlay.active { opacity: 1; pointer-events: all; }
        .message-overlay h2 { font-size: 36px; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 15px #ff0000; text-align: center; }
        
        .btn-restart-top { background: var(--btn-bg); color: var(--gold); border: 1px solid var(--gold); padding: 8px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-size: 14px; margin-bottom: 15px; }

        @media (max-width: 600px) { .bestiary-grid { grid-template-columns: repeat(2, 1fr); } .entry-img { width: 50px; height: 50px; } }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>DnD 2048</h1>
            <p>连携觉醒：魔物统御</p>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span>Score</span><strong id="score">0</strong></div>
            <div class="stat-box"><span>Best</span><strong id="best">0</strong></div>
            <div class="stat-box gold-box"><span>Gold</span><strong id="ui-gold">0</strong></div>
        </div>
    </header>

    <button class="btn-restart-top" id="btn-restart">↻ 重新试炼（装卸能力将在此刻生效）</button>

    <!-- Synergies Panel (Moved to top) -->
    <div class="synergies-container" id="synergies-container"></div>

    <!-- Multi-Slot Panel -->
    <div class="slots-container" id="slots-container"></div>

    <!-- Gold Abilities -->
    <div class="gold-abilities">
        <button class="gold-btn" id="btn-g-kill">律令死亡 💀<br><span id="cost-kill">2G</span></button>
        <button class="gold-btn" id="btn-g-rewind">时光倒流 ⏳<br><span id="cost-rewind">2G</span></button>
        <button class="gold-btn" id="btn-g-swap">移形换影 🌀<br><span id="cost-swap">2G</span></button>
    </div>

    <div class="game-wrapper">
        <div class="game-container" id="game-container">
            <div id="targeting-banner">请选择目标</div>
            <div class="grid-background" id="grid-bg"></div>
            <div class="tile-container" id="tile-container"></div>
            <div class="message-overlay" id="message-overlay">
                <h2 id="msg-text">Game Over</h2>
                <button class="btn-use-ability ready" id="btn-msg-action" style="padding: 12px 30px; font-size: 16px;">继续挑战</button>
            </div>
        </div>
    </div>

    <div class="bestiary-section">
        <h2 class="bestiary-title">🗡️ 冒险者魔物指南</h2>
        <div class="bestiary-subtitle" id="book-tip">点击卡片装备。某些组合将触发隐藏连携！</div>
        <div class="bestiary-grid" id="bestiary-grid"></div>
    </div>

function generateSVG(val) {
    let pixels = MONSTERS[val]?.pixels;
    if(!pixels) return '';
    let rects = '';
    for(let y=0; y<16; y++) for(let x=0; x<16; x++) if(pixels[y][x] && pixels[y][x] !== '.') rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${P[pixels[y][x]]}" />`;
    return `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" class="tile-img">${rects}</svg>`;
}

function migrateLegacyData() {
    const vars = ['Gold', 'Best', 'Unlocked', 'EquippedArr', 'UnlockedSlots', 'GameState'];
    const suffixes = ['_v13', '_v12', '_v11', '_v10', '_v9', '_v8', '_v7', ''];
    vars.forEach(v => {
        let currentKey = `dnd2048${v}_vFinal`;
        if (localStorage.getItem(currentKey) === null) {
            for (let suffix of suffixes) {
                let old = localStorage.getItem(`dnd2048${v}${suffix}`);
                if (old !== null) { 
                    localStorage.setItem(currentKey, old); 
                    break; 
                }
            }
        }
    });
}

function saveGameData() {
    const gameState = {
        board: board, score: score, nextTileId: nextTileId, history: history,
        currentAbilities: currentAbilities, abilityCharges: abilityCharges, 
        lichUsed: lichUsed, goldCosts: goldCosts, ogreMergeCount: ogreMergeCount,

        guaranteedFireElemental: guaranteedFireElemental, ambushBonusCount: ambushBonusCount
    };
    localStorage.setItem('dnd2048GameState_vFinal', JSON.stringify(gameState));
}

function initGame(forceRestart = false) {
    let savedState = null;
    if (!forceRestart) { try { savedState = JSON.parse(localStorage.getItem('dnd2048GameState_vFinal')); } catch(e) {} }

    if (savedState && savedState.board) {
        board = savedState.board; score = savedState.score || 0; history = savedState.history || [];
        nextTileId = savedState.nextTileId || 1; currentAbilities = savedState.currentAbilities || [...equippedAbilities];
        abilityCharges = savedState.abilityCharges || {}; lichUsed = savedState.lichUsed || false; ogreMergeCount = savedState.ogreMergeCount || 0;
        goldCosts = savedState.goldCosts || { kill: 2, rewind: 2, swap: 2 };
        goblinSynergyGold = savedState.goblinSynergyGold || 0; abolethSpawnsLeft = savedState.abolethSpawnsLeft || 0; 
        guaranteedFireElemental = savedState.guaranteedFireElemental || false; ambushBonusCount = savedState.ambushBonusCount || 0;
    } else {
        board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        score = 0; nextTileId = 1; history = []; currentAbilities = [...equippedAbilities];
        abilityCharges = {}; lichUsed = false; ogreMergeCount = 0;
        goldCosts = { kill: 2, rewind: 2, swap: 2 }; goblinSynergyGold = 0; abolethSpawnsLeft = 0; 
        guaranteedFireElemental = false; ambushBonusCount = 0;
    }

    tilesMap = {}; tileContainer.innerHTML = '';
    bestEl.innerText = bestScore; scoreEl.innerText = score; uiGold.innerText = totalGold; 
    isAnimating = false; cancelTargeting();
    
    const gridBg = document.getElementById('grid-bg');
    if(gridBg.children.length === 0) { for(let i=0; i<SIZE*SIZE; i++) { let cell = document.createElement('div'); cell.className = 'grid-cell'; gridBg.appendChild(cell); } }

    if (savedState && savedState.board) {
        for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) if(board[y][x]) createTileDOM(board[y][x].id, board[y][x].val, x, y);
        updateFreezeUI();
    } else {
        addRandomTile(); addRandomTile(); saveGameData();
    }

    renderBestiary(); updateSlotsUI();
}

function getActiveSynergies(baseAbilities) {
    return SYNERGIES.filter(syn => syn.req.every(id => baseAbilities.includes(id)));
}
function hasActiveSynergy(name) { return getActiveSynergies(currentAbilities).some(s => s.name.includes(name)); }
function isAbilityReplaced(id) {
    let activeSyns = getActiveSynergies(currentAbilities);
    return activeSyns.some(s => s.type === "replace" && s.replace.includes(id));
}
function hasActiveAbility(id) { return currentAbilities.includes(id); }

function deductGold(amount) {
    totalGold -= amount; localStorage.setItem('dnd2048Gold_vFinal', totalGold); uiGold.innerText = totalGold;
}

function updateScore(add) {
    score += add; scoreEl.innerText = score;
    if (score > bestScore) { bestScore = score; bestEl.innerText = bestScore; localStorage.setItem('dnd2048Best_vFinal', bestScore); }
}

function getEmptyCells(currentBoard) {
    let cells = [];
    for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) if (!currentBoard[y][x]) cells.push({x, y});
    return cells;
}

function hasAdjacent(x, y, val) {
    let count = 0;
    [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
        let ny = y+d[0], nx = x+d[1];
        if(ny>=0 && ny<SIZE && nx>=0 && nx<SIZE && board[ny][nx] && board[ny][nx].val === val) count++;
    });
    return count;
}

function addRandomTile() {
    let emptyCells = getEmptyCells(board);
    if (emptyCells.length > 0) {
        let pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        let r = Math.random();
        let val = r < 0.7 ? 2 : 4; 

        if (abolethSpawnsLeft > 0) {
            val = 16; abolethSpawnsLeft--;
        } else if (hasActiveSynergy("雷霆鼠疫")) {
            val = 2; // 100% 洞穴鼠
        } else {
            if (!isAbilityReplaced(32768) && hasActiveAbility(32768)) {
                val = r < 0.333 ? 4 : (r < 0.666 ? 8 : 16);
            } else if (!isAbilityReplaced(2) && hasActiveAbility(2)) {
                val = r < 0.9 ? 2 : 4;
            }
        }

        let id = nextTileId++;
        board[pos.y][pos.x] = { id, val, frozen: 0 };
        createTileDOM(id, val, pos.x, pos.y);
    }
}

function showFloatingVFX(x, y, text, color = "var(--gold-bright)") {
    let el = document.createElement('div'); el.className = 'floating-text'; el.innerText = text; el.style.color = color;
    el.style.left = `calc(${x * 20.4 + 9.2}%)`; el.style.top = `calc(${y * 20.4 + 9.2}%)`; tileContainer.appendChild(el);
    setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 1000);
}

function createTileDOM(id, val, x, y, isMerge = false, isCrit = false, isFireUp = false, isVampUp = false) {
    if (!unlocked.includes(val) && MONSTERS[val]) {
        unlocked.push(val);
        localStorage.setItem('dnd2048Unlocked_vFinal', JSON.stringify(unlocked));
        renderBestiary();
    }
    
    let el = document.createElement('div'); el.className = 'tile';
    if(isCrit) el.classList.add('crit');
    if(isFireUp) el.classList.add('fire-upgrade');
    if(isVampUp) el.classList.add('vampire-up');
    
    let inner = document.createElement('div'); inner.className = `tile-inner t-${val}`;
    inner.innerHTML = `<div class="tile-val">${val}</div>${generateSVG(val)}`;
    el.appendChild(inner);
    
    if (isCrit) { let ft = document.createElement('div'); ft.className = 'floating-text'; ft.innerText = 'CRIT!'; ft.style.left = "50%"; ft.style.top = "50%"; el.appendChild(ft); }
    if (isFireUp) { let ft = document.createElement('div'); ft.className = 'floating-text'; ft.innerText = '🔥火元觉醒'; ft.style.left = "50%"; ft.style.top = "50%"; ft.style.color = "#ff9800"; el.appendChild(ft); }

    el.style.transform = `translate(${x * 111}%, ${y * 111}%)`;
    if(isMerge && !isCrit && !isFireUp && !isVampUp) el.classList.add('merged');
    
    tileContainer.appendChild(el); tilesMap[id] = { el, x, y, val };
}

function removeTileDOM(id, playVfx = false) {
    let tile = tilesMap[id];
    if (tile && tile.el.parentNode) {
        if (playVfx) {
            tile.el.classList.add('destroyed');
            setTimeout(() => { if (tile.el.parentNode) tile.el.parentNode.removeChild(tile.el); delete tilesMap[id]; }, 300);
        } else { tile.el.parentNode.removeChild(tile.el); delete tilesMap[id]; }
    }
}

function destroyTileAt(x, y, isVfx = true) {
    let cell = board[y][x];
    if (!cell) return null;
    let val = cell.val; let isFrozen = cell.frozen > 0; let id = cell.id;

    board[y][x] = null; removeTileDOM(id, isVfx);

    if (isFrozen && hasActiveSynergy("熔火琉璃")) {
        let scoreBonus = Math.floor(val / 2);
        updateScore(scoreBonus);
        if (Math.random() < 0.25) {
            let emptyCells = getEmptyCells(board);
            if (emptyCells.length > 0) {
                let pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                let newId = nextTileId++; board[pos.y][pos.x] = { id: newId, val: 256, frozen: 0 };
                setTimeout(()=> { createTileDOM(newId, 256, pos.x, pos.y, false, false, true); }, 50); 
            }
        }
        showFloatingVFX(x, y, `+${scoreBonus}分`, "#ff9800");
    }
    return { val, id };
}

function upgradeAllRats() {
    let upgraded = false;
    for(let y=0; y<SIZE; y++) {
        for(let x=0; x<SIZE; x++) {
            if (board[y][x] && board[y][x].val === 2) {
                removeTileDOM(board[y][x].id, false);
                let newId = nextTileId++;
                board[y][x] = {id: newId, val: 4, frozen: 0};
                createTileDOM(newId, 4, x, y, false, false, true); 
                upgraded = true;
            }
        }
    }
    if(upgraded) showFloatingVFX(2, 2, "地穴战争爆发！", "#f44336");
}

function saveState() {
    let bCopy = board.map(row => row.map(c => c ? { ...c } : null)); 
    history.push({ board: bCopy, score: score, nextTileId: nextTileId }); // 时光倒流只保存棋盘和分数
    if (history.length > 50) history.shift();
}

function updateFreezeUI() {
    for(let id in tilesMap) {
        let t = tilesMap[id]; let cell = board[t.y][t.x];
        if (cell && cell.frozen > 0) t.el.classList.add('frozen');
        else t.el.classList.remove('frozen');
    }
}

function playAbilityVFX() {
    gameContainer.style.boxShadow = "inset 0 0 60px var(--gold-bright), 0 10px 40px rgba(0,0,0,0.9)";
    gameContainer.style.borderColor = "var(--gold-bright)";
    setTimeout(() => {
        gameContainer.style.boxShadow = "inset 0 0 30px rgba(0,0,0,0.9), 0 10px 30px rgba(0,0,0,0.8)";
        gameContainer.style.borderColor = "#362a30";
    }, 400);
}

// ---- 通用目标选择系统 ----
function startTargeting(abilityId, prompt, validFn, count, onComplete) {
    isTargetingMode = true; targetingAbilityId = abilityId; targetingConfig = { prompt, validFn, count, targets: [], onComplete };
    gameContainer.classList.add('targeting'); targetingBanner.style.display = 'block'; updateTargetingBanner();
}
function cancelTargeting() {
    isTargetingMode = false; targetingConfig = null; targetingAbilityId = null;
    gameContainer.classList.remove('targeting'); targetingBanner.style.display = 'none';
    document.querySelectorAll('.tile').forEach(el => el.style.opacity = 1); updateSlotsUI();
}
function updateTargetingBanner() {
    if (!isTargetingMode) return;
    if (targetingConfig.count > 1) targetingBanner.innerText = `${targetingConfig.prompt} (${targetingConfig.targets.length}/${targetingConfig.count})`;
    else targetingBanner.innerText = targetingConfig.prompt;
}
gameContainer.addEventListener('click', (e) => {
    if (!isTargetingMode || !targetingConfig) return;
    let targetEl = e.target.closest('.tile');
    if (targetEl) {
        let t = Object.values(tilesMap).find(m => m.el === targetEl);
        if (t && board[t.y][t.x] && targetingConfig.validFn(board[t.y][t.x], t.x, t.y) && !targetingConfig.targets.some(m=>m.x===t.x&&m.y===t.y)) {
            targetingConfig.targets.push({x: t.x, y: t.y, cell: board[t.y][t.x]});
            t.el.style.opacity = 0.4; updateTargetingBanner();
            if (targetingConfig.targets.length >= targetingConfig.count) {
                let onComplete = targetingConfig.onComplete; let targets = targetingConfig.targets;
                cancelTargeting(); onComplete(targets);
            }
        }
    }
});

// ---- 金币能力逻辑 ----
document.getElementById('btn-g-kill').addEventListener('click', () => {

document.getElementById('btn-g-rewind').addEventListener('click', () => {

document.getElementById('btn-g-swap').addEventListener('click', () => {

// ---- 魔物主动能力行为函数 ----

            kobolds.forEach(k => { destroyTileAt(k.x, k.y, false); let newId = nextTileId++; board[k.y][k.x] = {id: newId, val: upgradeVal, frozen: 0}; createTileDOM(newId, upgradeVal, k.x, k.y, false, false, true); });

        startTargeting(8, "剔除弱者：选择1个哥布林", (c) => c.val === 8, 1, tgts => {
            let k = tgts[0]; let adjs = []; let destroyedRat = false;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {

                if(ny>=0 && ny<SIZE && nx>=0 && nx<SIZE && board[ny][nx]) { if (board[ny][nx].val === 2 || board[ny][nx].val === 4) adjs.push({x:nx, y:ny, id: board[ny][nx].id}); }

            if (adjs.length > 0) {

        startTargeting(16, "寒气凝结：选择1个魔物冻结", c => c.frozen <= 0, 1, tgts => { board[tgts[0].y][tgts[0].x].frozen = 5; updateFreezeUI(); executeAbilityFinish(16); }); return;
    }

            let gCount = ghouls.length; let targetTiers = {1: 128, 2: 512, 3: 2048, 4: 32768};

                if (hasActiveSynergy("腐宴贪食")) { let gain = gCount; deductGold(-gain); showFloatingVFX(tgt.x, tgt.y, `+${gain} G`, "#ffd700"); if (upgradeVal >= 512) { ogreMergeCount++; if (ogreMergeCount >= 4) { ogreMergeCount = 0; deductGold(-1); } } }

            tile1.el.classList.add('swap-anim'); tile2.el.classList.add('swap-anim'); tile1.el.style.zIndex = 50; tile2.el.style.zIndex = 50;

                    abilityCharges[4] = Math.min(MONSTERS[4].ability.cd, (abilityCharges[4] || 0) + 10); ambushBonusCount = 1; showFloatingVFX(p1.x, p1.y, "包抄!", "#00bcd4");
                }
            }

            setTimeout(() => { tile1.el.classList.remove('swap-anim'); tile2.el.classList.remove('swap-anim'); tile1.el.style.zIndex = 10; tile2.el.style.zIndex = 10; }, 500);
            updateFreezeUI(); executeAbilityFinish(128);
        }); return;

    if (id == 1024) {
        if (!board.flat().some(c => c && c.val === 1024)) return;
        let count = board.flat().filter(c => c && c.frozen <= 0).length; if (count === 0) return;
        startTargeting(1024, "石化凝视：冻结4个目标", c => c.frozen <= 0, Math.min(4, count), tgts => { tgts.forEach(t => board[t.y][t.x].frozen = 4); updateFreezeUI(); executeAbilityFinish(1024); }); return;

        if (count > 0) { 
            deductGold(-(count * 3)); showFloatingVFX(2, 2, `+${count*3} G`); success = true; 
            if (hasActiveSynergy("终焉轮回") && count >= 24 && lichUsed) { lichUsed = false; showFloatingVFX(2, 3, `💀轮回倒转，命匣重铸！`, '#e040fb'); }
        }
    }

    if (success) executeAbilityFinish(id, id == 65536);

function abilityDestroyCond(condFunc, maxCount = 999, isVfx = true) {
    let cells = [];
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x] && condFunc(board[y][x].val)) cells.push({x,y, id: board[y][x].id});
    if(cells.length === 0) return 0; cells.sort(() => Math.random() - 0.5);
    let count = 0;
    for(let i=0; i<Math.min(maxCount, cells.length); i++) {
        let p = cells[i]; destroyTileAt(p.x, p.y, isVfx); count++;
    }
    return count;
}

function executeAbilityFinish(id, skipGlobalVFX = false) {
    if(!skipGlobalVFX) playAbilityVFX();
    abilityCharges[id] = 0; updateSlotsUI(); saveGameData();
}

// ---------------- UI Slots System ----------------
function buySlot(slotIndex) {
    let price = slotIndex === 1 ? 2000 : 20000;
    if (totalGold >= price) { deductGold(price); unlockedSlots = slotIndex + 1; localStorage.setItem('dnd2048UnlockedSlots_vFinal', unlockedSlots); updateSlotsUI(); }
}

function equipAbility(val) {
    let idx = equippedAbilities.indexOf(val);
    if (idx !== -1) { equippedAbilities[idx] = null; } 
    else {
        let emptyIdx = equippedAbilities.indexOf(null);
        if (emptyIdx !== -1 && emptyIdx < unlockedSlots) { equippedAbilities[emptyIdx] = val; } 
        else {
            let p = document.getElementById('book-tip'); p.innerText = "槽位已满，请先点击上方槽位或图鉴卸下能力！"; p.style.color = "var(--f44336)";
            setTimeout(()=> { p.innerText = "点击卡片装备。某些组合将触发隐藏连携！"; p.style.color="var(--text-muted)";}, 2000); return;
        }
    }
    localStorage.setItem('dnd2048EquippedArr_vFinal', JSON.stringify(equippedAbilities));
    renderBestiary(); updateSlotsUI();
}

function updateSynergyUI() {
    synergiesContainer.innerHTML = '';
    let activeSyns = getActiveSynergies(equippedAbilities); 
    if (activeSyns.length > 0) {
        activeSyns.forEach(s => {
            let el = document.createElement('div'); el.className = 'synergy-box active';
            let t = s.type === 'replace' ? '变异' : '共鸣';
            el.innerHTML = `<div class="synergy-header"><span>${s.name}</span><span class="synergy-tag">${t}</span></div><div class="synergy-desc">${s.desc}</div>`;
            synergiesContainer.appendChild(el);
        });
    }
}

function updateSlotsUI() {
    document.getElementById('cost-kill').innerText = `${goldCosts.kill}G`; document.getElementById('btn-g-kill').disabled = totalGold < goldCosts.kill;
    document.getElementById('cost-rewind').innerText = `${goldCosts.rewind}G`; document.getElementById('btn-g-rewind').disabled = totalGold < goldCosts.rewind || history.length === 0;
    document.getElementById('cost-swap').innerText = `${goldCosts.swap}G`; document.getElementById('btn-g-swap').disabled = totalGold < goldCosts.swap;

    slotsContainer.innerHTML = '';
    for(let i=0; i<3; i++) {
        let slotEl = document.createElement('div');
        if (i >= unlockedSlots) {
            slotEl.className = 'slot locked'; let price = i === 1 ? '2000G' : '20000G';
            slotEl.innerHTML = `<div class="lock-icon">🔒</div><div class="lock-price">${price}解锁</div>`; slotEl.onclick = () => buySlot(i);
        } else {
            let abId = currentAbilities[i]; let preId = equippedAbilities[i];
            if (abId) {
                slotEl.className = 'slot equipped'; let m = MONSTERS[abId]; let cd = m.ability.cd; let chg = abilityCharges[abId] || 0;
                let btnHTML = '';
                if (cd > 0) {
                    if (m.ability.type === 'active') {
                        if (chg >= cd) { let btnTxt = (isTargetingMode && targetingAbilityId == abId) ? '取消' : '释放'; btnHTML = `<button class="slot-btn ready" onclick="triggerActiveAbility(${abId})">${btnTxt}</button>`; } 
                        else { btnHTML = `<button class="slot-btn" disabled>${chg}/${cd}</button>`; }
                    } else { btnHTML = `<button class="slot-btn" disabled>${chg}/${cd}</button>`; }
                } else {
                    let replaced = isAbilityReplaced(abId);
                    btnHTML = `<button class="slot-btn" style="border-color:${replaced?'#e040fb':'var(--gold)'}; color:${replaced?'#e040fb':'var(--gold)'};" disabled>${replaced?'变异中':'被动生效'}</button>`;
                }
                slotEl.innerHTML = `<div class="slot-icon">${generateSVG(abId)}</div><div class="slot-name">${m.name}</div>${btnHTML}`;
            } else if (preId) {
                slotEl.className = 'slot equipped'; slotEl.style.opacity = '0.6'; let m = MONSTERS[preId];
                slotEl.innerHTML = `<div class="slot-icon">${generateSVG(preId)}</div><div class="slot-name">${m.name}</div><button class="slot-btn" disabled>下局生效</button>`;
                slotEl.onclick = () => equipAbility(preId);
            } else { slotEl.className = 'slot empty'; slotEl.innerHTML = `<span>槽位 ${i+1}</span>`; }
        }
        slotsContainer.appendChild(slotEl);
    }
    updateSynergyUI();
}

function renderBestiary() {
    bestiaryGrid.innerHTML = ''; const sortedKeys = Object.keys(MONSTERS).map(Number).sort((a,b)=>a-b);
    sortedKeys.forEach(val => {
        let isUnlocked = unlocked.includes(val); let data = MONSTERS[val];
        let entry = document.createElement('div'); let isEquipped = equippedAbilities.includes(val);
        entry.className = `book-entry ${isUnlocked ? '' : 'locked'} ${isEquipped ? 'equipped' : ''}`;
        entry.innerHTML = `<div class="entry-img">${generateSVG(val)}</div><div class="entry-name">${isUnlocked ? data.name : '???'}</div>${isUnlocked && data.ability ? `<div class="entry-ability"><b>${data.ability.type=='active'?'[主动]':'[被动]'} ${data.ability.name} ${data.ability.cd>0?'(CD:'+data.ability.cd+')':''}</b><br>${data.ability.desc}</div>` : ''}<div style="font-size:10px; color:#666; margin-top:auto; padding-top:5px;">LV. ${val}</div>`;
        if (isUnlocked) {
            entry.addEventListener('click', () => {
                equipAbility(val);
                let oldText = document.querySelector('.bestiary-subtitle').innerText;
                document.querySelector('.bestiary-subtitle').innerText = `已预设：${data.name} (将在点击“重新试炼”时生效)`; document.querySelector('.bestiary-subtitle').style.color = 'var(--gold-bright)';
                setTimeout(() => { document.querySelector('.bestiary-subtitle').innerText = '点击卡片装备。某些组合将触发隐藏连携！'; document.querySelector('.bestiary-subtitle').style.color = 'var(--text-muted)'; }, 3000);
            });
        }
        bestiaryGrid.appendChild(entry);
    });
}

function abilityShuffle(isPassive = false) {
    let coords = []; let tiles = [];
    for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++) if(board[y][x]) { coords.push({x,y}); tiles.push(board[y][x]); }
    if(tiles.length === 0) return false;
    for (let i = tiles.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [tiles[i], tiles[j]] = [tiles[j], tiles[i]]; }
    for(let i=0; i<coords.length; i++) {
        let p = coords[i]; let t = tiles[i]; board[p.y][p.x] = t;
        let tileObj = tilesMap[t.id]; 
        if(tileObj) {
            tileObj.x = p.x; tileObj.y = p.y;
            tileObj.el.style.transform = `translate(${p.x * 111}%, ${p.y * 111}%)`;
            if(!isPassive) tileObj.el.classList.add('shuffle-anim');
        }
    }
    if(!isPassive) { setTimeout(() => { document.querySelectorAll('.shuffle-anim').forEach(el => el.classList.remove('shuffle-anim')); }, 500); }
    updateFreezeUI(); return true;
}

function move(direction) {
    if (isAnimating || overlay.classList.contains('active')) return;
    if (isTargetingMode) cancelTargeting();
    ambushBonusCount = 0; 
    
    let vector = { 'up': {x:0,y:-1}, 'down': {x:0,y:1}, 'left': {x:-1,y:0}, 'right': {x:1,y:0} }[direction];
    let traX = Array.from({length: SIZE}, (_,i)=>i); let traY = Array.from({length: SIZE}, (_,i)=>i);
    if (vector.x === 1) traX.reverse(); if (vector.y === 1) traY.reverse();

    let newBoard = board.map(row => row.map(c => c ? { ...c } : null));
    let mergedMap = Array(SIZE).fill().map(()=>Array(SIZE).fill(false));
    let moved = false; let scoreAdd = 0; let moves = []; let creates = [];

    for (let y of traY) {
        for (let x of traX) {
            let cell = newBoard[y][x];
            if (cell) {
                if (cell.frozen > 0) continue; 
                let currX = x, currY = y; let nextX = x + vector.x, nextY = y + vector.y;
                while (nextX>=0 && nextX<SIZE && nextY>=0 && nextY<SIZE && newBoard[nextY][nextX] === null) {
                    currX = nextX; currY = nextY; nextX += vector.x; nextY += vector.y;
                }
                
                if (nextX>=0 && nextX<SIZE && nextY>=0 && nextY<SIZE && newBoard[nextY][nextX] !== null && 
                    newBoard[nextY][nextX].val === cell.val && !mergedMap[nextY][nextX] && !(newBoard[nextY][nextX].frozen > 0)) {
                    
                    let target = newBoard[nextY][nextX]; newBoard[y][x] = null;
                    let newVal = target.val * 2; let isCrit = false; let isFireUp = false; let baseScore = newVal;
                    
                    if (hasActiveSynergy("雷霆鼠疫") && target.val === 2) { newVal = 8; baseScore = 8; }
                    
                    if (target.val === 2097152) {
                        newVal = 2; baseScore = 2; showFloatingVFX(nextX, nextY, "✨繁华落尽", '#9c27b0');
                    } else {
                        let bonusLevels = 0;
                        if (hasActiveSynergy("圣痕异能")) {
                            let r = Math.random();
                            if (r < 0.01) bonusLevels += 4; else if (r < 0.04) bonusLevels += 3; else if (r < 0.14) bonusLevels += 2;
                            if (bonusLevels > 0) { 
                                let critGold = hasActiveSynergy("圣堂税契") ? 2 : 1;
                                deductGold(-critGold); showFloatingVFX(nextX, nextY, `+${critGold} G`, '#e040fb'); 
                            }
                        } else {
                            if (!isAbilityReplaced(262144) && hasActiveAbility(262144) && Math.random() < 0.1) { 
                                bonusLevels += 1; 
                                let critGold = hasActiveSynergy("圣堂税契") ? 2 : 1;
                                deductGold(-critGold); showFloatingVFX(nextX, nextY, `+${critGold} G`); 
                            }
                            if (!isAbilityReplaced(2048) && hasActiveAbility(2048)) {
                                let r = Math.random(); if (r < 0.02) bonusLevels += 2; else if (r < 0.07) bonusLevels += 1;
                            }
                        }
                        if (bonusLevels > 0) { for(let i=0; i<bonusLevels; i++) newVal *= 2; isCrit = true; }
                        
                        if (hasActiveSynergy("爆燃核心") && newVal === 256 && guaranteedFireElemental) {
                            newVal = 512; isFireUp = true; guaranteedFireElemental = false;
                        } else if (!isAbilityReplaced(512) && hasActiveAbility(512) && newVal === 256 && Math.random() < 0.5) {
                            newVal = 512; isFireUp = true;
                        }
                    }
                    
                    let localScoreAdd = baseScore;
                    if (!isAbilityReplaced(512) && hasActiveAbility(512)) {
                        let fireCount = board.flat().filter(c => c && c.val === 512).length;
                        if (fireCount > 0) localScoreAdd = localScoreAdd * (1 + fireCount);
                    }
                    
                    if (hasActiveSynergy("巨胃金库")) {
                        if (newVal === 64) { ogreMergeCount++; if (ogreMergeCount >= 3) { ogreMergeCount = 0; deductGold(-1); showFloatingVFX(nextX, nextY, "+1 G", '#e040fb'); } }
                        if (newVal === 8192) { deductGold(-25); showFloatingVFX(nextX, nextY, "+25 G", '#e040fb'); }
                    } else {
                        if (!isAbilityReplaced(64) && hasActiveAbility(64) && newVal === 64) {
                            ogreMergeCount++; if (ogreMergeCount >= 4) { ogreMergeCount = 0; deductGold(-1); showFloatingVFX(nextX, nextY, "+1 G"); }
                        }
                        if (!isAbilityReplaced(8192) && hasActiveAbility(8192) && newVal === 8192) { deductGold(-20); showFloatingVFX(nextX, nextY, "+20 G"); }
                    }

                    if (newVal === 524288) { lichUsed = false; goldCosts = {kill: 2, rewind: 2, swap: 2}; }

                    let newId = nextTileId++; newBoard[nextY][nextX] = { id: newId, val: newVal, frozen: 0 };
                    mergedMap[nextY][nextX] = true; scoreAdd += localScoreAdd; moved = true;

                    moves.push({ id: cell.id, toX: nextX, toY: nextY, destroy: true });
                    moves.push({ id: target.id, toX: nextX, toY: nextY, destroy: true });
                    creates.push({ id: newId, val: newVal, x: nextX, y: nextY, crit: isCrit, fireUp: isFireUp });
                } else if (currX !== x || currY !== y) {
                    newBoard[currY][currX] = cell; newBoard[y][x] = null; moved = true;
                    moves.push({ id: cell.id, toX: currX, toY: currY, destroy: false });
                }
            }
        }
    }

    if (moved) {
        isAnimating = true; saveState();
        for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) if(newBoard[y][x] && newBoard[y][x].frozen > 0) newBoard[y][x].frozen--;

        board = newBoard; updateScore(scoreAdd);
        
        currentAbilities.forEach(id => {
            let m = MONSTERS[id];
            if (m && (m.ability.type === 'active' || id == 131072)) abilityCharges[id] = (abilityCharges[id] || 0) + 1;
        });
        updateSlotsUI();

        moves.forEach(m => { let t = tilesMap[m.id]; if (t) { t.x = m.toX; t.y = m.toY; t.el.style.transform = `translate(${t.x * 111}%, ${t.y * 111}%)`; if (m.destroy) t.el.style.zIndex = "5"; } });

        setTimeout(() => {
            moves.filter(m => m.destroy).forEach(m => removeTileDOM(m.id, false));
            creates.forEach(c => createTileDOM(c.id, c.val, c.x, c.y, true, c.crit, c.fireUp));
            
            // 被动技能后处理
            if (!isAbilityReplaced(131072) && hasActiveAbility(131072) && abilityCharges[131072] >= 10) {
                let success = false; let maxVal = Math.max(...board.flat().filter(c=>c).map(c=>c.val));
                if (hasActiveSynergy("冰晶解离")) {
                    let fTargets = [];
                    for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE; c++) if(board[r][c] && board[r][c].frozen > 0 && board[r][c].val < maxVal) fTargets.push({x:c, y:r, id:board[r][c].id});
                    if (fTargets.length > 0) {
                        let t = fTargets[Math.floor(Math.random() * fTargets.length)];
                        destroyTileAt(t.x, t.y, true); success = true; showFloatingVFX(t.x, t.y, "❄️冰晶解离", '#e040fb');
                    }
                }
                if (!success) success = abilityDestroyCond(v => v < maxVal, 1, true) > 0;
                if (success) { abilityCharges[131072] = 0; updateSlotsUI(); }
            }

            let hasTiamat = board.flat().some(c => c && c.val === 2097152);
            if (!isAbilityReplaced(2097152) && hasActiveAbility(2097152) && hasTiamat) {
                for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) {
                    if(!board[y][x] || board[y][x].val !== 2097152) {
                        if (board[y][x]) removeTileDOM(board[y][x].id, true);
                        let newId = nextTileId++; board[y][x] = {id: newId, val: 2097152, frozen: 0}; createTileDOM(newId, 2097152, x, y);
                    }
                }
                setTimeout(() => { showMsg('🏆 神圣干涉', '恶龙神后降临，世界迎来终结与新生！\n金币已结算'); handleGameOverGold(); document.getElementById('btn-msg-action').innerText = "重获新生"; }, 500); return;
            }

            updateFreezeUI(); addRandomTile(); saveGameData(); checkGameOverAction(); isAnimating = false;
        }, 150);
    }
}

function handleGameOverGold() {
    let baseGold = Math.floor(Math.sqrt(score)); let multi = 1;
    if (hasActiveSynergy("巨胃金库")) { multi += 0.40; } 
    else {
        if (!isAbilityReplaced(64) && hasActiveAbility(64)) multi += 0.1;
        if (!isAbilityReplaced(8192) && hasActiveAbility(8192)) multi += 0.25;
    }
    let earnedGold = Math.floor(baseGold * multi);
    totalGold += earnedGold; localStorage.setItem('dnd2048Gold_vFinal', totalGold); uiGold.innerText = totalGold;
    return earnedGold;
}

function checkGameOverAction() {
    let isOver = true;
    for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
            if (board[y][x] === null) { isOver = false; continue; }
            if (x < SIZE - 1 && board[y][x+1] && board[y][x].val === board[y][x+1].val && !(board[y][x].frozen > 0 || board[y][x+1].frozen > 0)) isOver = false;
            if (y < SIZE - 1 && board[y+1][x] && board[y][x].val === board[y+1][x].val && !(board[y][x].frozen > 0 || board[y+1][x].frozen > 0)) isOver = false;
        }
    }
    if (isOver) {
        if (!isAbilityReplaced(524288) && hasActiveAbility(524288) && !lichUsed) {
            lichUsed = true; let maxVal = Math.max(...board.flat().filter(c=>c).map(c=>c.val));
            abilityDestroyCond(v => v !== maxVal, 999, true); goldCosts = {kill: 2, rewind: 2, swap: 2};
            playAbilityVFX(); updateSlotsUI(); saveGameData(); showMsg('命匣存储生效', '巫妖的命匣为你重塑了肉身\n全场低级魔物已献祭，金币花费重置！'); setTimeout(() => { overlay.classList.remove('active'); }, 2500); return;
        }
        let earned = handleGameOverGold(); showMsg('试炼结束', `你的冒险止步于此\n本次获得金币: ${earned} 🪙`);
    }
}

function showMsg(title, sub) {
    msgText.innerText = title; let p = document.createElement('p'); p.innerText = sub; p.style.color="#8c8279"; p.style.fontSize="16px"; p.style.marginBottom="20px"; p.style.textAlign="center"; p.style.lineHeight="1.5";
    if(msgText.nextSibling.tagName === 'P') msgText.nextSibling.remove(); msgText.parentNode.insertBefore(p, msgText.nextSibling); overlay.classList.add('active');
}

document.addEventListener('keydown', e => {
    const key = e.key;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) { e.preventDefault(); move(key.replace('Arrow', '').toLowerCase()); } 
    else if (['w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(key)) { e.preventDefault(); const wasdMap = { 'w': 'up', 'W': 'up', 's': 'down', 'S': 'down', 'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right' }; move(wasdMap[key]); }
});
let touchStartX = 0, touchStartY = 0; gameContainer.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive: true}); gameContainer.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false}); gameContainer.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - touchStartX; let dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left'); else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
});

document.getElementById('btn-restart').addEventListener('click', () => { overlay.classList.remove('active'); localStorage.removeItem('dnd2048GameState_vFinal'); currentAbilities = [...equippedAbilities]; initGame(true); });
document.getElementById('btn-msg-action').addEventListener('click', () => { overlay.classList.remove('active'); localStorage.removeItem('dnd2048GameState_vFinal'); currentAbilities = [...equippedAbilities]; initGame(true); });

initGame();
</script>
